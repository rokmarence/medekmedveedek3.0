<header class="hero d-flex align-items-center">
  <div class="container">
    <h1>Imate vprašanje?</h1>
    <p>Z veseljem vam odgovorimo...</p>
  </div>
</header>

<main>

  <section class="contact-section">

    <div class="decor decor-1">
        <img src="img/honey1.png" alt="">
      </div>
      
      <div class="decor decor-2">
        <img src="img/honey2.png" alt="">
      </div>
      
      <div class="decor decor-3">
        <img src="img/honey3.png" alt="">
      </div>

    <div class="container">
      <div class="contact-card mx-auto">
        <div class="text-center mb-4">
            <img src="img/logo.png" alt="Honey logo" class="logo-img">
          </div>

        <form>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Ime</label>
              <input type="text" class="form-control">
            </div>

            <div class="col-md-6">
              <label class="form-label">E-pošta</label>
              <input type="email" class="form-control">
            </div>

            <div class="col-md-6">
              <label class="form-label">Priimek</label>
              <input type="text" class="form-control">
            </div>

            <div class="col-md-6">
              <label class="form-label">Telefon</label>
              <input type="tel" class="form-control">
            </div>

            <div class="col-12">
              <label class="form-label">Sporočilo</label>
              <textarea class="form-control" rows="5"></textarea>
            </div>

            <div class="col-12 d-flex justify-content-between align-items-center">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="terms">
                <label class="form-check-label" for="terms">
                  Strinjam se s pogoji uporabe
                </label>
              </div>

              <button type="submit" class="btn btn-dark px-4">Pošlji</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </section>

  <section class="info-section py-5">
    <div class="container">
      <div class="row gy-4">
        <div class="col-md-6">
          <h2>Obratovanje</h2>
          <p>Pon: 7.00 – 15.00<br>
             Tor: 7.00 – 15.00<br>
             Sre: 7.00 – 15.00<br>
             Čet: 7.00 – 15.00<br>
             Pet: 7.00 – 15.00<br>
             Vikendi: zaprto</p>
        </div>

        <div class="col-md-6">
          <h2>Medek Medvedek</h2>
          <p>Ulica: Naša ulica 59<br>
             Kraj: Maribor<br>
             Država: Slovenija</p>

          <p>+386 67 676 767<br>
             medek@email.si</p>
        </div>
      </div>
    </div>
  </section>

  <section class="map-section"></section>

</main>
